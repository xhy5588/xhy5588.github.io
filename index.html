<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hongyuan Xu | Robotics Engineer</title>
  <meta
    name="description"
    content="Hongyuan Xu is a robotics engineer focused on robot vision, reinforcement learning, and autonomous systems."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="#home">Hongyuan Xu</a>
      <nav class="nav" aria-label="Primary">
        <a href="#about">Biography</a>
        <a href="#projects">Projects</a>
        <a href="#experience">Experience</a>
        <a href="#contact">Contact</a>
      </nav>
      <a class="nav-cta" href="Hongyuan_s_resume.pdf" target="_blank" rel="noreferrer">Resume</a>
    </header>

    <main id="home" class="profile-page">
      <section class="page-intro">
        <p class="eyebrow">Profile</p>
        <h1 id="profile-name"></h1>
        <div class="title-list" id="profile-titles"></div>
      </section>

      <div class="profile-layout">
        <aside class="profile-sidebar" id="contact">
          <div class="portrait-card">
            <img id="avatar" alt="Hongyuan Xu portrait">
          </div>

          <section class="sidebar-card">
            <h2>Contact</h2>
            <div class="sidebar-list" id="contact-list"></div>
          </section>

          <section class="sidebar-card">
            <h2>Links</h2>
            <div class="sidebar-list" id="links-list"></div>
          </section>

          <section class="sidebar-card">
            <h2>Education</h2>
            <div class="education-list" id="education-list"></div>
          </section>
        </aside>

        <div class="profile-main">
          <section class="content-section" id="about">
            <h2>Biography</h2>
            <div class="prose" id="about-text"></div>
          </section>

          <section class="content-section">
            <h2>Research Interests</h2>
            <div class="interest-list" id="focus-list"></div>
          </section>

          <section class="content-section feature-section" id="projects">
            <h2>Featured Project</h2>
            <article class="feature-project">
              <div class="feature-copy">
                <p class="project-meta" id="featured-project-meta"></p>
                <h3 id="featured-project-title"></h3>
                <p id="featured-project-text"></p>
                <ul class="bullet-list" id="featured-project-highlights"></ul>
                <div class="project-actions" id="featured-project-actions"></div>
                <p class="project-note" id="featured-project-note"></p>
              </div>
              <div class="feature-media">
                <div class="video-shell">
                  <iframe
                    id="featured-project-video"
                    title="Featured project video"
                    loading="lazy"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen
                  ></iframe>
                </div>
              </div>
            </article>
          </section>

          <section class="content-section">
            <h2>Selected Projects</h2>
            <div class="project-list" id="project-list"></div>
          </section>

          <section class="content-section" id="experience">
            <h2>Experience</h2>
            <div class="experience-list" id="experience-list"></div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
